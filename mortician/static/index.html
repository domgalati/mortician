<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mortician</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css" crossorigin="anonymous" />
  <style>
    :root,
    html[data-theme="dark"] {
      --bg: #0f1419;
      --surface: #1a2332;
      --sidebar-bg: rgba(26, 35, 50, 0.6);
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #9cadc6;
      --accent: #5b9fd4;
      --accent-dim: #3d6f9a;
      --accent-soft: rgba(91, 159, 212, 0.13);
      --status-open: #e6a23c;
      --status-resolved: #67c23a;
      --pre-bg: #0d1117;
      --code-bg: rgba(45, 58, 79, 0.65);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.34);
      --font: "Segoe UI", system-ui, sans-serif;
      --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
    }
    html[data-theme="light"] {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --sidebar-bg: rgba(255, 255, 255, 0.92);
      --border: #c5d0df;
      --text: #1a2332;
      --muted: #5a6b82;
      --accent: #2b6cb0;
      --accent-dim: #4a8fd4;
      --accent-soft: rgba(43, 108, 176, 0.09);
      --status-open: #b45309;
      --status-resolved: #2f855a;
      --pre-bg: #f0f3f7;
      --code-bg: rgba(197, 208, 223, 0.45);
      --shadow: 0 8px 22px rgba(22, 34, 55, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      background: var(--surface);
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .header-tools {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-wrap: wrap;
    }
    .live {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .live-dot.on {
      background: var(--status-resolved);
      box-shadow: 0 0 8px var(--status-resolved);
    }
    .btn-header {
      font: inherit;
      font-size: 0.8rem;
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    .btn-header:hover:not(:disabled) {
      border-color: var(--accent-dim);
      color: var(--accent);
    }
    .btn-header:focus-visible,
    .btn-edit-section:focus-visible,
    .editor-actions button:focus-visible,
    .export-panel button:focus-visible,
    .list button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    .btn-header:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    details.export-menu {
      position: relative;
    }
    details.export-menu > summary {
      list-style: none;
      cursor: pointer;
    }
    details.export-menu > summary::-webkit-details-marker { display: none; }
    details.export-menu[open] > summary {
      border-color: var(--accent-dim);
    }
    .export-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      min-width: 220px;
      padding: 0.35rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      z-index: 20;
    }
    html[data-theme="dark"] .export-panel {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    }
    .export-panel button {
      display: block;
      width: 100%;
      text-align: left;
      font: inherit;
      font-size: 0.82rem;
      padding: 0.45rem 0.55rem;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }
    .export-panel button:hover:not(:disabled) {
      background: rgba(91, 159, 212, 0.12);
    }
    .export-panel button:disabled {
      color: var(--muted);
      cursor: not-allowed;
    }
    .export-panel hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.35rem 0;
    }
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(220px, 280px) 1fr;
      min-height: 0;
    }
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
    }
    aside {
      border-right: 1px solid var(--border);
      overflow: auto;
      background: var(--sidebar-bg);
    }
    .sidebar-groups {
      display: flex;
      flex-direction: column;
    }
    .sidebar-tools {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 0.7rem 0.75rem 0.55rem;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--sidebar-bg) 82%, var(--surface));
      backdrop-filter: blur(3px);
    }
    .sidebar-search {
      width: 100%;
      font: inherit;
      font-size: 0.83rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.38rem 0.48rem;
      margin-bottom: 0.5rem;
    }
    .sidebar-filters {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 0.2rem 0.5rem;
      font-size: 0.74rem;
      font: inherit;
      cursor: pointer;
    }
    .chip.active {
      color: var(--text);
      border-color: var(--accent-dim);
      background: var(--accent-soft);
    }
    .status-group {
      border-bottom: 1px solid var(--border);
    }
    .status-group:last-child { border-bottom: none; }
    .status-group summary {
      list-style: none;
      cursor: pointer;
      padding: 0.6rem 0.85rem 0.6rem 1rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.055em;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      user-select: none;
    }
    .status-group summary::-webkit-details-marker { display: none; }
    .status-group summary .summary-left {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
    }
    .status-group summary .chev {
      flex-shrink: 0;
      width: 0.5rem;
      height: 0.5rem;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: rotate(-45deg);
      margin-top: -0.2rem;
      transition: transform 0.15s ease;
    }
    .status-group[open] summary .chev {
      transform: rotate(45deg);
      margin-top: 0.1rem;
    }
    .status-group summary .count {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text);
      background: var(--border);
      padding: 0.12rem 0.45rem;
      border-radius: 999px;
      letter-spacing: 0;
      text-transform: none;
    }
    .status-group summary .label-unresolved { color: var(--status-open); }
    .status-group summary .label-temporary { color: #c9a227; }
    html[data-theme="light"] .status-group summary .label-temporary { color: #92400e; }
    .status-group summary .label-resolved { color: var(--status-resolved); }
    .status-group summary .label-other { color: var(--muted); }
    .list {
      list-style: none;
      margin: 0;
      padding: 0 0 0.4rem;
    }
    .list.nested { padding-left: 0.35rem; }
    .list button {
      width: 100%;
      text-align: left;
      padding: 0.55rem 0.85rem 0.55rem 1.35rem;
      border: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .list button:hover { background: rgba(91, 159, 212, 0.08); }
    .list button.active {
      background: rgba(91, 159, 212, 0.12);
      border-left-color: var(--accent);
    }
    .list .meta {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    main {
      overflow: auto;
      padding: 1.25rem 1.5rem 2rem;
    }
    .empty, .error {
      color: var(--muted);
      font-size: 0.96rem;
    }
    .error { color: #e85d5d; }
    html[data-theme="light"] .error { color: #c53030; }
    .detail {
      max-width: 1100px;
      margin: 0 auto;
      padding-bottom: 1rem;
    }
    .detail-top {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: -1.25rem -1.5rem 1rem;
      padding: 1rem 1.5rem 0.9rem;
      background: color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid var(--border);
    }
    html[data-theme="light"] .detail-top {
      background: color-mix(in srgb, var(--bg) 92%, transparent);
    }
    .detail h2 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    .detail .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.26rem 0.62rem;
      border-radius: 999px;
      background: var(--border);
      color: var(--muted);
      margin-bottom: 0.2rem;
    }
    .detail .badge.resolved { color: var(--status-resolved); }
    .detail .badge.unresolved { color: var(--status-open); }
    section {
      margin-bottom: 1.35rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 0.95rem 1rem;
    }
    section > h3 {
      margin: 0 0 0.5rem;
      font-size: 0.86rem;
      letter-spacing: 0.02em;
      color: var(--muted);
      font-weight: 600;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.4rem;
    }
    .section-head h3 {
      margin: 0;
      font-size: 0.86rem;
      letter-spacing: 0.02em;
      color: var(--muted);
      font-weight: 600;
    }
    .btn-edit-section {
      font: inherit;
      font-size: 0.76rem;
      padding: 0.26rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s ease, background-color 0.15s ease, color 0.15s ease;
    }
    .btn-edit-section:hover {
      color: var(--accent);
      border-color: var(--accent-dim);
      background: var(--accent-soft);
    }
    .btn-add-action {
      min-width: 6rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .md-editable {
      border-radius: 6px;
      transition: box-shadow 0.15s ease;
    }
    .md-editable:hover {
      box-shadow: 0 0 0 1px rgba(91, 159, 212, 0.25);
    }
    .md-editable.is-editing {
      box-shadow: none;
    }
    .md-editable.is-editing:hover {
      box-shadow: none;
    }
    .editor-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .editor-actions button {
      font: inherit;
      font-size: 0.8rem;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .editor-actions .btn-save {
      background: var(--accent);
      border-color: var(--accent-dim);
      color: #fff;
    }
    html[data-theme="light"] .editor-actions .btn-save {
      color: #fff;
    }
    .editor-actions .btn-cancel {
      background: transparent;
      color: var(--text);
    }
    section p, section li {
      margin: 0;
      line-height: 1.62;
      color: var(--text);
      font-size: 0.95rem;
    }
    .actions-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .actions-list .action-row {
      display: flex;
      gap: 0.65rem;
      align-items: flex-start;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.92rem;
    }
    .actions-list .action-row.dragging,
    .timeline .timeline-row.dragging {
      opacity: 0.45;
    }
    .actions-list .action-row.drop-target,
    .timeline .timeline-row.drop-target {
      box-shadow: inset 0 0 0 2px var(--accent-dim);
      border-radius: 6px;
    }
    .actions-list .action-row:last-child { border-bottom: none; }
    .action-check {
      flex-shrink: 0;
      cursor: pointer;
      padding: 0.2rem 0.35rem;
      margin: -0.1rem 0 0 -0.2rem;
      border-radius: 6px;
      display: flex;
      align-items: flex-start;
    }
    .action-check:hover {
      background: rgba(91, 159, 212, 0.14);
    }
    .action-done-cb {
      cursor: pointer;
      width: 1.05rem;
      height: 1.05rem;
      margin-top: 0.12rem;
      accent-color: var(--accent);
    }
    .action-body {
      flex: 1;
      min-width: 0;
      cursor: pointer;
      border-radius: 6px;
      padding: 0.2rem 0.45rem;
      margin: -0.2rem -0.45rem;
      outline: none;
    }
    .action-body:hover {
      background: rgba(91, 159, 212, 0.1);
    }
    .action-body:focus-visible {
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    .action-row-plain {
      padding-left: 0.15rem;
      color: var(--muted);
    }
    .actions-list .act-title { font-weight: 500; }
    .actions-list .act-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }
    .action-edit-form {
      width: 100%;
    }
    .action-edit-form .act-field {
      display: block;
      margin-bottom: 0.55rem;
    }
    .action-edit-form .act-field span {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    .action-edit-form textarea,
    .action-edit-form input[type="text"] {
      width: 100%;
      font: inherit;
      font-size: 0.88rem;
      padding: 0.4rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      box-sizing: border-box;
    }
    .action-edit-form textarea {
      resize: vertical;
      min-height: 4rem;
    }
    .timeline {
      list-style: none;
      padding: 0;
      margin: 0;
      border-left: 2px solid var(--border);
    }
    .timeline li {
      padding: 0.45rem 0 0.45rem 1rem;
      position: relative;
    }
    .timeline li::before {
      content: "";
      position: absolute;
      left: -5px;
      top: 0.65rem;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 2px solid var(--bg);
    }
    .timeline .t { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); }
    .timeline-day {
      margin: 0.75rem 0 0.3rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      font-weight: 600;
      text-transform: uppercase;
    }
    .timeline-time-line {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }
    .timeline-rel {
      font-size: 0.73rem;
      color: var(--muted);
    }
    .timeline .a { margin-top: 0.15rem; }
    .timeline .a.md { font-size: 0.9rem; }
    .timeline .timeline-body {
      cursor: pointer;
      border-radius: 6px;
      padding: 0.2rem 0.45rem;
      margin: -0.2rem -0.45rem;
      outline: none;
    }
    .timeline .timeline-body:hover {
      background: rgba(91, 159, 212, 0.1);
    }
    .timeline .timeline-body:focus-visible {
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    .assets-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .assets-list li {
      padding: 0.25rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .assets-list li:last-child {
      border-bottom: none;
    }
    .assets-list a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    .assets-list a:hover {
      text-decoration: underline;
    }
    .md {
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--text);
    }
    .md > *:first-child { margin-top: 0; }
    .md > *:last-child { margin-bottom: 0; }
    .md p { margin: 0 0 0.65rem; }
    .md h1, .md h2, .md h3, .md h4 {
      margin: 1rem 0 0.45rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .md h1 { font-size: 1.2rem; }
    .md h2 { font-size: 1.1rem; }
    .md h3, .md h4 { font-size: 1rem; }
    .md ul, .md ol { margin: 0 0 0.65rem; padding-left: 1.35rem; }
    .md li { margin: 0.25rem 0; }
    .md blockquote {
      margin: 0 0 0.65rem;
      padding: 0.35rem 0 0.35rem 0.85rem;
      border-left: 3px solid var(--accent-dim);
      color: var(--muted);
    }
    .md code {
      font-family: var(--mono);
      font-size: 0.84em;
      background: var(--code-bg);
      padding: 0.12em 0.35em;
      border-radius: 4px;
    }
    .md pre {
      margin: 0 0 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--pre-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.82rem;
      line-height: 1.45;
    }
    .md pre code {
      background: transparent;
      padding: 0;
      font-size: inherit;
    }
    .md table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 0.75rem;
      font-size: 0.88rem;
    }
    .md th, .md td {
      border: 1px solid var(--border);
      padding: 0.4rem 0.55rem;
      text-align: left;
    }
    .md th { background: rgba(45, 58, 79, 0.4); }
    html[data-theme="light"] .md th { background: rgba(197, 208, 223, 0.35); }
    .md a { color: var(--accent); }
    .md a:hover { text-decoration: underline; }
    .md img {
      display: block;
      max-width: min(100%, 960px);
      width: auto;
      height: auto;
      margin: 0.5rem 0 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      object-fit: contain;
    }
    .timeline .a.md img {
      max-width: min(100%, 680px);
      margin-top: 0.35rem;
      margin-bottom: 0.45rem;
    }
    .md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }
    .md-subtitle {
      margin: 0.85rem 0 0.35rem;
      font-size: 0.82rem;
      letter-spacing: 0.03em;
      color: var(--muted);
      font-weight: 600;
    }
    .md-subtitle:first-child { margin-top: 0; }
    .EasyMDEContainer .CodeMirror {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    .EasyMDEContainer .CodeMirror-cursor { border-color: var(--text); }
    .EasyMDEContainer .editor-toolbar {
      border-color: var(--border);
      background: var(--bg);
    }
    .EasyMDEContainer .editor-toolbar button {
      color: var(--text) !important;
    }
    .EasyMDEContainer .editor-preview,
    .EasyMDEContainer .editor-preview-side {
      background: var(--surface);
      border-color: var(--border);
    }
    .loading-skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }
    .loading-line {
      height: 0.85rem;
      border-radius: 999px;
      margin: 0.6rem 0;
      background: linear-gradient(
        90deg,
        rgba(140, 153, 171, 0.12) 0%,
        rgba(140, 153, 171, 0.28) 50%,
        rgba(140, 153, 171, 0.12) 100%
      );
      background-size: 240% 100%;
      animation: shimmer 1.25s ease-in-out infinite;
    }
    .loading-line.lg { height: 1.2rem; width: 62%; }
    .loading-line.md { width: 84%; }
    .loading-line.sm { width: 54%; }
    @keyframes shimmer {
      0% { background-position: 220% 0; }
      100% { background-position: -40% 0; }
    }
    .toast-wrap {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      z-index: 50;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      box-shadow: var(--shadow);
      border-radius: 8px;
      padding: 0.5rem 0.7rem;
      min-width: 180px;
      max-width: 320px;
      font-size: 0.86rem;
    }
    .toast.success { border-left-color: var(--status-resolved); }
    .toast.error { border-left-color: #e85d5d; color: var(--text); }
    @media (prefers-reduced-motion: reduce) {
      .loading-line { animation: none; }
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Mortician</h1>
    <div class="header-tools">
      <details class="export-menu" id="exportMenu">
        <summary class="btn-header" id="exportSummary">Export</summary>
        <div class="export-panel">
          <button type="button" id="exportZip">Bundle as .zip</button>
          <hr />
          <button type="button" disabled title="Coming soon">Bundle as PDF</button>
          <button type="button" disabled title="Coming soon">Bundle as unified markdown</button>
          <button type="button" disabled title="Coming soon">Export to Confluence</button>
        </div>
      </details>
      <button type="button" class="btn-header" id="themeToggle" title="Toggle light/dark">Theme</button>
      <div class="live" title="Live updates via Server-Sent Events">
        <span class="live-dot" id="liveDot"></span>
        <span id="liveLabel">Connecting…</span>
      </div>
    </div>
  </header>
  <div class="layout">
    <aside>
      <div class="sidebar-tools">
        <input type="search" id="sidebarSearch" class="sidebar-search" placeholder="Filter incidents by title or id" />
        <div class="sidebar-filters" id="sidebarStatusFilters">
          <button type="button" class="chip active" data-status-filter="all">All</button>
        </div>
      </div>
      <div class="sidebar-groups" id="incidentList"></div>
    </aside>
    <main id="main"></main>
  </div>
  <div class="toast-wrap" id="toastWrap" aria-live="polite" aria-atomic="true"></div>
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js" crossorigin="anonymous"></script>
  <script>
    const listEl = document.getElementById("incidentList");
    const mainEl = document.getElementById("main");
    const liveDot = document.getElementById("liveDot");
    const liveLabel = document.getElementById("liveLabel");
    const exportMenu = document.getElementById("exportMenu");
    const exportSummary = document.getElementById("exportSummary");
    const exportZipBtn = document.getElementById("exportZip");
    const themeToggle = document.getElementById("themeToggle");
    const toastWrap = document.getElementById("toastWrap");
    const sidebarSearch = document.getElementById("sidebarSearch");
    const sidebarStatusFilters = document.getElementById("sidebarStatusFilters");

    let selectedId = null;
    let summaries = [];
    let lastDetailRaw = {};
    let activeMde = null;
    let activeEditWrap = null;
    let activePreviewEl = null;
    let activeSection = null;

    let lastActions = [];
    let lastTimeline = [];
    let actionEditBody = null;
    let actionEditSnapshot = null;
    let timelineEditBody = null;
    let timelineEditSnapshot = null;
    let ownerSuggestions = [];
    let sidebarStatusFilter = "all";
    let dragActionIndex = null;

    const SIDEBAR_COLLAPSED_KEY = "mortician.sidebarCollapsed";
    const THEME_KEY = "mortician.theme";

    let STATUS_BUCKETS = [
      { key: "unresolved", label: "Unresolved", labelClass: "label-unresolved" },
      { key: "temporary", label: "Temporary resolution", labelClass: "label-temporary" },
      { key: "resolved", label: "Resolved", labelClass: "label-resolved" },
      { key: "other", label: "Other", labelClass: "label-other" },
    ];
    let STATUS_CONFIG = { statuses: [] };
    let STATUS_META_BY_LABEL = new Map();

    function rebuildStatusMeta() {
      STATUS_META_BY_LABEL = new Map();
      const statuses = Array.isArray(STATUS_CONFIG.statuses) ? STATUS_CONFIG.statuses : [];
      for (const s of statuses) {
        const label = String(s.label || "").trim();
        if (!label) continue;
        const meta = {
          bucket: String(s.bucket || "other"),
          badgeClass: String(s.badgeClass || ""),
        };
        STATUS_META_BY_LABEL.set(label.toLowerCase(), meta);
        STATUS_META_BY_LABEL.set(String(s.key || "").toLowerCase(), meta);
        const aliases = Array.isArray(s.aliases) ? s.aliases : [];
        for (const alias of aliases) {
          STATUS_META_BY_LABEL.set(String(alias || "").toLowerCase(), meta);
        }
      }
    }

    function renderStatusFilterChips() {
      if (!sidebarStatusFilters) return;
      const current = sidebarStatusFilter || "all";
      sidebarStatusFilters.innerHTML = "";
      const allBtn = document.createElement("button");
      allBtn.type = "button";
      allBtn.className = "chip" + (current === "all" ? " active" : "");
      allBtn.dataset.statusFilter = "all";
      allBtn.textContent = "All";
      sidebarStatusFilters.appendChild(allBtn);
      for (const b of STATUS_BUCKETS) {
        if (b.key === "other") continue;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip" + (current === b.key ? " active" : "");
        btn.dataset.statusFilter = b.key;
        btn.textContent = b.label || b.key;
        sidebarStatusFilters.appendChild(btn);
      }
    }

    async function loadStatusConfig() {
      const r = await fetch("/api/statuses");
      if (!r.ok) throw new Error("Failed to load statuses");
      const cfg = await r.json();
      STATUS_CONFIG = cfg || { statuses: [] };
      if (Array.isArray(cfg.buckets) && cfg.buckets.length) {
        STATUS_BUCKETS = cfg.buckets;
      }
      rebuildStatusMeta();
      renderStatusFilterChips();
    }

    function initTheme() {
      let t = localStorage.getItem(THEME_KEY);
      if (t !== "light" && t !== "dark") {
        t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      document.documentElement.setAttribute("data-theme", t);
    }

    initTheme();

    themeToggle.addEventListener("click", () => {
      const cur = document.documentElement.getAttribute("data-theme") || "dark";
      const next = cur === "light" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem(THEME_KEY, next);
      if (activeMde && activeMde.codemirror) {
        activeMde.codemirror.refresh();
      }
    });

    function setExportEnabled(on) {
      exportSummary.style.pointerEvents = on ? "" : "none";
      exportSummary.style.opacity = on ? "" : "0.45";
      exportZipBtn.disabled = !on;
      if (!on && exportMenu.open) exportMenu.open = false;
    }

    setExportEnabled(false);

    exportZipBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (!selectedId) return;
      exportMenu.open = false;
      window.location.href =
        "/api/postmortems/" + encodeURIComponent(selectedId) + "/export.zip";
    });

    exportMenu.addEventListener("toggle", () => {
      if (exportMenu.open && !selectedId) {
        exportMenu.open = false;
      }
    });

    function statusBucket(raw) {
      const s = String(raw || "").trim().toLowerCase();
      const meta = STATUS_META_BY_LABEL.get(s);
      if (meta && meta.bucket) return meta.bucket;
      return "other";
    }

    function getCollapsedBuckets() {
      try {
        return new Set(JSON.parse(localStorage.getItem(SIDEBAR_COLLAPSED_KEY) || "[]"));
      } catch {
        return new Set();
      }
    }

    function persistCollapsedBucket(bucketKey, collapsed) {
      const s = getCollapsedBuckets();
      if (collapsed) s.add(bucketKey);
      else s.delete(bucketKey);
      localStorage.setItem(SIDEBAR_COLLAPSED_KEY, JSON.stringify([...s]));
    }

    listEl.addEventListener("toggle", (e) => {
      const el = e.target;
      if (el.tagName !== "DETAILS" || !el.dataset.bucket) return;
      persistCollapsedBucket(el.dataset.bucket, !el.open);
    });
    if (sidebarSearch) {
      sidebarSearch.addEventListener("input", () => renderList());
    }
    document.addEventListener("click", (e) => {
      const chip = e.target.closest(".chip[data-status-filter]");
      if (!chip) return;
      sidebarStatusFilter = chip.dataset.statusFilter || "all";
      document.querySelectorAll("#sidebarStatusFilters .chip[data-status-filter]").forEach((el) => {
        el.classList.toggle("active", el === chip);
      });
      renderList();
    });

    function statusClass(status) {
      const s = String(status || "").trim().toLowerCase();
      const meta = STATUS_META_BY_LABEL.get(s);
      if (meta && meta.badgeClass) return meta.badgeClass;
      return "";
    }

    function showToast(msg, kind = "success") {
      if (!toastWrap) return;
      const t = document.createElement("div");
      t.className = "toast " + (kind === "error" ? "error" : "success");
      t.textContent = String(msg || "");
      toastWrap.appendChild(t);
      window.setTimeout(() => {
        if (t.parentNode) t.parentNode.removeChild(t);
      }, 2200);
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s == null ? "" : String(s);
      return d.innerHTML;
    }

    function renderMd(raw) {
      const t = raw == null ? "" : String(raw);
      if (!t.trim()) return "";
      if (typeof marked === "undefined" || typeof DOMPurify === "undefined") {
        return esc(t).replace(/\n/g, "<br>");
      }
      try {
        const html = marked.parse(t, { gfm: true, breaks: false });
        return DOMPurify.sanitize(html);
      } catch (_) {
        return esc(t).replace(/\n/g, "<br>");
      }
    }

    function impactMarkdownForEdit(imp) {
      imp = imp || {};
      if (imp.markdown && String(imp.markdown).trim()) return String(imp.markdown);
      const affected = String(imp.affected_services || "").trim();
      const duration = String(imp.duration_of_outage || "").trim();
      const business = String(imp.business_impact || "").trim();
      let impactMarkdown = "";
      if (affected) impactMarkdown += "### Affected Services\n" + affected + "\n\n";
      if (duration) impactMarkdown += "### Duration of Outage\n" + duration + "\n\n";
      if (business) impactMarkdown += "### Business Impact\n" + business + "\n\n";
      return impactMarkdown;
    }

    function parseImpactSubsections(md) {
      const text = String(md || "");
      const lines = text.split("\n");
      const out = { affected: "", duration: "", business: "" };
      let key = null;
      const flush = [];
      function commit() {
        if (!key) return;
        out[key] = flush.join("\n").trim();
      }
      for (const line of lines) {
        const t = line.trim();
        if (t === "### Affected Services") {
          commit();
          key = "affected";
          flush.length = 0;
          continue;
        }
        if (t === "### Duration of Outage") {
          commit();
          key = "duration";
          flush.length = 0;
          continue;
        }
        if (t === "### Business Impact") {
          commit();
          key = "business";
          flush.length = 0;
          continue;
        }
        if (key) flush.push(line);
      }
      commit();
      return out;
    }

    function buildActionsHtml(actions) {
      if (!actions.length) {
        return '<p class="empty">No action items.</p>';
      }
      const items = actions.map((raw, i) => {
        if (!raw || typeof raw !== "object") {
          return (
            '<li class="action-row action-row-plain">' + esc(String(raw)) + "</li>"
          );
        }
        const done = raw.done === true || raw.completed === true;
        const task = (raw.task || raw.title || "").trim();
        const owner = (raw.owner || "").trim();
        const due = (raw.due || "").trim();
        const rest = {};
        for (const k of Object.keys(raw)) {
          if (["done", "completed", "task", "title", "owner", "due"].includes(k)) continue;
          rest[k] = raw[k];
        }
        const extra = Object.keys(rest)
          .map((k) => k + ": " + String(rest[k]))
          .filter((s) => s.trim());
        const taskLine = task || "(No description)";
        const metaBits = [];
        if (owner) metaBits.push("Owner: " + owner);
        if (due) metaBits.push("Due: " + due);
        if (extra.length) metaBits.push(extra.join("; "));
        const metaHtml = metaBits.length
          ? '<div class="act-meta">' + esc(metaBits.join(" · ")) + "</div>"
          : "";
        return (
          '<li class="action-row" draggable="true" data-action-index="' +
          i +
          '">' +
          '<label class="action-check" title="Toggle done (saved to disk)">' +
          '<input type="checkbox" class="action-done-cb"' +
          (done ? " checked" : "") +
          " />" +
          "</label>" +
          '<div class="action-body" tabindex="0" role="button" title="Click to edit task, owner, and due">' +
          '<div class="action-display">' +
          '<div class="act-title">' +
          esc(taskLine) +
          "</div>" +
          metaHtml +
          "</div></div></li>"
        );
      });
      return '<ul class="actions-list">' + items.join("") + "</ul>";
    }

    function collectOwnerSuggestions(detail, actions) {
      const opts = new Set();
      if (detail && detail.incident_owner) opts.add(String(detail.incident_owner).trim());
      const participants = detail && detail.incident_participants;
      if (Array.isArray(participants)) {
        participants.forEach((p) => opts.add(String(p || "").trim()));
      } else if (typeof participants === "string") {
        participants.split(",").forEach((p) => opts.add(String(p || "").trim()));
      }
      (actions || []).forEach((a) => {
        if (a && typeof a === "object" && a.owner) opts.add(String(a.owner).trim());
      });
      return [...opts].filter(Boolean).sort((a, b) => a.localeCompare(b));
    }

    function onActionEditKeydown(ev) {
      if (ev.key === "Escape") {
        ev.preventDefault();
        closeActionRowEditor();
      }
    }

    function closeActionRowEditor() {
      document.removeEventListener("keydown", onActionEditKeydown);
      if (actionEditBody && actionEditSnapshot != null) {
        actionEditBody.innerHTML = actionEditSnapshot;
      }
      actionEditBody = null;
      actionEditSnapshot = null;
    }

    function onTimelineEditKeydown(ev) {
      if (ev.key === "Escape") {
        ev.preventDefault();
        closeTimelineRowEditor();
      }
    }

    function closeTimelineRowEditor() {
      document.removeEventListener("keydown", onTimelineEditKeydown);
      if (timelineEditBody && timelineEditSnapshot != null) {
        timelineEditBody.innerHTML = timelineEditSnapshot;
      }
      timelineEditBody = null;
      timelineEditSnapshot = null;
    }

    async function patchAction(index, payload) {
      if (!selectedId) return false;
      try {
        const r = await fetch(
          "/api/postmortems/" +
            encodeURIComponent(selectedId) +
            "/actions/" +
            index,
          {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          }
        );
        if (!r.ok) {
          let msg = "Update failed";
          try {
            const j = await r.json();
            if (j.error) msg = j.error;
          } catch (_) {}
          alert(msg);
          showToast(msg, "error");
          return false;
        }
        showToast("Action updated");
        return true;
      } catch (_) {
        alert("Network error");
        showToast("Network error", "error");
        return false;
      }
    }

    async function postAction(payload) {
      if (!selectedId) return false;
      try {
        const r = await fetch(
          "/api/postmortems/" + encodeURIComponent(selectedId) + "/actions",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          }
        );
        if (!r.ok) {
          let msg = "Could not add item";
          try {
            const j = await r.json();
            if (j.error) msg = j.error;
          } catch (_) {}
          alert(msg);
          showToast(msg, "error");
          return false;
        }
        showToast("Action added");
        return true;
      } catch (_) {
        alert("Network error");
        showToast("Network error", "error");
        return false;
      }
    }

    async function postTimeline(payload) {
      if (!selectedId) return false;
      try {
        const r = await fetch(
          "/api/postmortems/" + encodeURIComponent(selectedId) + "/timeline",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          }
        );
        if (!r.ok) {
          let msg = "Could not add timeline event";
          try {
            const j = await r.json();
            if (j.error) msg = j.error;
          } catch (_) {}
          alert(msg);
          showToast(msg, "error");
          return false;
        }
        showToast("Timeline event added");
        return true;
      } catch (_) {
        alert("Network error");
        showToast("Network error", "error");
        return false;
      }
    }

    async function patchTimeline(index, payload) {
      if (!selectedId) return false;
      try {
        const r = await fetch(
          "/api/postmortems/" +
            encodeURIComponent(selectedId) +
            "/timeline/" +
            index,
          {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          }
        );
        if (!r.ok) {
          let msg = "Update failed";
          try {
            const j = await r.json();
            if (j.error) msg = j.error;
          } catch (_) {}
          alert(msg);
          showToast(msg, "error");
          return false;
        }
        showToast("Timeline event updated");
        return true;
      } catch (_) {
        alert("Network error");
        showToast("Network error", "error");
        return false;
      }
    }

    async function reorderActions(fromIndex, toIndex) {
      if (!selectedId) return false;
      try {
        const r = await fetch("/api/postmortems/" + encodeURIComponent(selectedId) + "/actions/reorder", {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ from_index: fromIndex, to_index: toIndex }),
        });
        return r.ok;
      } catch (_) {
        return false;
      }
    }

    async function bulkSetActions(done) {
      if (!selectedId) return false;
      try {
        const r = await fetch("/api/postmortems/" + encodeURIComponent(selectedId) + "/actions/bulk-state", {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ done: Boolean(done) }),
        });
        return r.ok;
      } catch (_) {
        return false;
      }
    }

    async function sortTimelineByTime() {
      if (!selectedId) return false;
      try {
        const r = await fetch("/api/postmortems/" + encodeURIComponent(selectedId) + "/timeline/sort-by-time", {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
        });
        return r.ok;
      } catch (_) {
        return false;
      }
    }

    function openNewActionEditor() {
      const host = document.getElementById("actionNewHost");
      if (!host || !selectedId) return;
      destroyActiveEditor();
      closeActionRowEditor();
      closeTimelineRowEditor();
      host.innerHTML =
        '<form class="action-edit-form">' +
        '<label class="act-field"><span>Task</span><textarea name="task" rows="3"></textarea></label>' +
        '<label class="act-field"><span>Owner</span><input type="text" name="owner" list="ownerSuggestionsList" autocomplete="off" /></label>' +
        '<label class="act-field"><span>Due</span><input type="date" name="due" autocomplete="off" /></label>' +
        '<div class="editor-actions">' +
        '<button type="submit" class="btn-save">Save</button>' +
        '<button type="button" class="btn-cancel">Cancel</button>' +
        "</div></form>";
      const form = host.querySelector("form");
      form.querySelector(".btn-cancel").addEventListener("click", () => {
        host.innerHTML = "";
      });
      form.addEventListener("submit", async (ev) => {
        ev.preventDefault();
        const taskVal = String(form.elements.task.value || "").trim();
        if (!taskVal) {
          alert("Task is required.");
          return;
        }
        const ownerVal = String(form.elements.owner.value || "").trim();
        const dueVal = String(form.elements.due.value || "").trim();
        const ok = await postAction({
          task: taskVal,
          owner: ownerVal,
          due: dueVal,
        });
        if (!ok) return;
        host.innerHTML = "";
        await loadDetail(selectedId);
      });
      form.elements.task.focus();
    }

    function openNewTimelineEditor() {
      const host = document.getElementById("timelineNewHost");
      if (!host || !selectedId) return;
      destroyActiveEditor();
      closeActionRowEditor();
      closeTimelineRowEditor();
      host.innerHTML =
        '<form class="action-edit-form">' +
        '<label class="act-field"><span>Time</span><input type="text" name="time" autocomplete="off" placeholder="2026-03-24 14:30 UTC" /></label>' +
        '<label class="act-field"><span>Action</span><textarea name="action" rows="3"></textarea></label>' +
        '<div class="editor-actions">' +
        '<button type="submit" class="btn-save">Save</button>' +
        '<button type="button" class="btn-cancel">Cancel</button>' +
        "</div></form>";
      const form = host.querySelector("form");
      form.querySelector(".btn-cancel").addEventListener("click", () => {
        host.innerHTML = "";
      });
      form.addEventListener("submit", async (ev) => {
        ev.preventDefault();
        const timeVal = String(form.elements.time.value || "").trim();
        const actionVal = String(form.elements.action.value || "").trim();
        if (!timeVal) {
          alert("Time is required.");
          return;
        }
        if (!actionVal) {
          alert("Action is required.");
          return;
        }
        const ok = await postTimeline({
          time: timeVal,
          action: actionVal,
        });
        if (!ok) return;
        host.innerHTML = "";
        await loadDetail(selectedId);
      });
      form.elements.time.focus();
    }

    function openActionRowEditor(bodyEl) {
      const row = bodyEl.closest(".action-row");
      if (!row || row.classList.contains("action-row-plain")) return;
      const idx = parseInt(row.dataset.actionIndex, 10);
      if (Number.isNaN(idx) || !lastActions[idx] || typeof lastActions[idx] !== "object") return;
      destroyActiveEditor();
      closeActionRowEditor();
      closeTimelineRowEditor();
      const raw = lastActions[idx];
      const task = (raw.task || raw.title || "").trim();
      const owner = (raw.owner || "").trim();
      const due = (raw.due || "").trim();

      actionEditBody = bodyEl;
      actionEditSnapshot = bodyEl.innerHTML;

      bodyEl.innerHTML =
        '<form class="action-edit-form">' +
        '<label class="act-field"><span>Task</span><textarea name="task" rows="3"></textarea></label>' +
        '<label class="act-field"><span>Owner</span><input type="text" name="owner" list="ownerSuggestionsList" autocomplete="off" /></label>' +
        '<label class="act-field"><span>Due</span><input type="date" name="due" autocomplete="off" /></label>' +
        '<div class="editor-actions">' +
        '<button type="submit" class="btn-save">Save</button>' +
        '<button type="button" class="btn-cancel">Cancel</button>' +
        "</div></form>";

      const form = bodyEl.querySelector("form");
      form.elements.task.value = task;
      form.elements.owner.value = owner;
      form.elements.due.value = due;

      form.querySelector(".btn-cancel").addEventListener("click", () => closeActionRowEditor());
      form.addEventListener("submit", async (ev) => {
        ev.preventDefault();
        const taskVal = String(form.elements.task.value || "").trim();
        const ownerVal = String(form.elements.owner.value || "").trim();
        const dueVal = String(form.elements.due.value || "").trim();
        const ok = await patchAction(idx, {
          task: taskVal,
          owner: ownerVal,
          due: dueVal,
        });
        if (!ok) return;
        closeActionRowEditor();
        await loadDetail(selectedId);
      });
      document.addEventListener("keydown", onActionEditKeydown);
      form.elements.task.focus();
    }

    function openTimelineRowEditor(bodyEl) {
      const row = bodyEl.closest(".timeline-row");
      if (!row || row.classList.contains("timeline-row-plain")) return;
      const idx = parseInt(row.dataset.timelineIndex, 10);
      if (Number.isNaN(idx) || !lastTimeline[idx] || typeof lastTimeline[idx] !== "object") return;
      destroyActiveEditor();
      closeActionRowEditor();
      closeTimelineRowEditor();
      const raw = lastTimeline[idx];
      const time = (raw.time || "").trim();
      const action = (raw.action || "").trim();

      timelineEditBody = bodyEl;
      timelineEditSnapshot = bodyEl.innerHTML;

      bodyEl.innerHTML =
        '<form class="action-edit-form">' +
        '<label class="act-field"><span>Time</span><input type="text" name="time" autocomplete="off" /></label>' +
        '<label class="act-field"><span>Action</span><textarea name="action" rows="3"></textarea></label>' +
        '<div class="editor-actions">' +
        '<button type="submit" class="btn-save">Save</button>' +
        '<button type="button" class="btn-cancel">Cancel</button>' +
        "</div></form>";

      const form = bodyEl.querySelector("form");
      form.elements.time.value = time;
      form.elements.action.value = action;

      form.querySelector(".btn-cancel").addEventListener("click", () => closeTimelineRowEditor());
      form.addEventListener("submit", async (ev) => {
        ev.preventDefault();
        const timeVal = String(form.elements.time.value || "").trim();
        const actionVal = String(form.elements.action.value || "").trim();
        if (!timeVal) {
          alert("Time is required.");
          return;
        }
        if (!actionVal) {
          alert("Action is required.");
          return;
        }
        const ok = await patchTimeline(idx, {
          time: timeVal,
          action: actionVal,
        });
        if (!ok) return;
        closeTimelineRowEditor();
        await loadDetail(selectedId);
      });
      document.addEventListener("keydown", onTimelineEditKeydown);
      form.elements.time.focus();
    }

    function editableBlock(section, innerMdHtml) {
      return (
        '<div class="md-editable" data-section="' +
        esc(section) +
        '"><div class="md-view"><div class="md">' +
        innerMdHtml +
        "</div></div></div>"
      );
    }

    function sectionWithEdit(title, sectionSlug, innerMdHtml) {
      return (
        "<section><div class=\"section-head\"><h3>" +
        esc(title) +
        "</h3>" +
        '<button type="button" class="btn-edit-section" data-section="' +
        esc(sectionSlug) +
        '">Edit</button></div>' +
        editableBlock(sectionSlug, innerMdHtml) +
        "</section>"
      );
    }

    function destroyActiveEditor() {
      if (activeMde) {
        const ta = activeMde.element;
        try {
          activeMde.toTextArea();
        } catch (_) {}
        activeMde = null;
        if (ta && ta.parentNode) ta.parentNode.removeChild(ta);
      }
      const bar = activeEditWrap && activeEditWrap.querySelector(".editor-actions");
      if (bar && bar.parentNode) bar.parentNode.removeChild(bar);
      if (activePreviewEl && activeEditWrap) {
        activeEditWrap.classList.remove("is-editing");
        const view = activeEditWrap.querySelector(".md-view");
        if (view) view.style.display = "";
      }
      activeEditWrap = null;
      activePreviewEl = null;
      activeSection = null;
    }

    async function saveSection(issueId, section, text) {
      const r = await fetch(
        "/api/postmortems/" + encodeURIComponent(issueId) + "/sections/" + encodeURIComponent(section),
        {
          method: "PUT",
          headers: { "Content-Type": "text/plain; charset=utf-8" },
          body: text,
        }
      );
      if (!r.ok) {
        let msg = "Save failed";
        try {
          const j = await r.json();
          if (j.error) msg = j.error;
        } catch (_) {}
        alert(msg);
        showToast(msg, "error");
        return false;
      }
      showToast("Section saved");
      return true;
    }

    function startEdit(section) {
      if (!selectedId || typeof EasyMDE === "undefined") return;
      const initial = lastDetailRaw[section];
      const text = initial == null ? "" : String(initial);
      const wrap = mainEl.querySelector('.md-editable[data-section="' + section + '"]');
      if (!wrap) return;
      destroyActiveEditor();
      closeActionRowEditor();
      const view = wrap.querySelector(".md-view");
      if (!view) return;
      view.style.display = "none";
      wrap.classList.add("is-editing");
      const ta = document.createElement("textarea");
      wrap.appendChild(ta);
      activeEditWrap = wrap;
      activePreviewEl = view;
      activeSection = section;

      activeMde = new EasyMDE({
        element: ta,
        initialValue: text,
        spellChecker: false,
        status: ["lines", "words", "cursor"],
        renderingConfig: {
          singleLineBreaks: false,
        },
        previewClass: ["editor-preview", "md"],
      });

      const bar = document.createElement("div");
      bar.className = "editor-actions";
      bar.innerHTML =
        '<button type="button" class="btn-save">Save</button>' +
        '<button type="button" class="btn-cancel">Cancel</button>';
      wrap.appendChild(bar);

      bar.querySelector(".btn-save").addEventListener("click", async () => {
        const body = activeMde ? activeMde.value() : text;
        const ok = await saveSection(selectedId, section, body);
        if (!ok) return;
        destroyActiveEditor();
        await loadDetail(selectedId);
      });
      bar.querySelector(".btn-cancel").addEventListener("click", () => {
        destroyActiveEditor();
      });
    }

    mainEl.addEventListener("click", (e) => {
      if (e.target.closest(".action-edit-form")) return;
      if (e.target.id === "btnAddAction" || e.target.closest("#btnAddAction")) {
        e.preventDefault();
        openNewActionEditor();
        return;
      }
      if (e.target.id === "btnAddTimeline" || e.target.closest("#btnAddTimeline")) {
        e.preventDefault();
        openNewTimelineEditor();
        return;
      }
      if (e.target.id === "btnMarkAllDone") {
        e.preventDefault();
        bulkSetActions(true).then((ok) => {
          if (!ok) return showToast("Could not update actions", "error");
          loadDetail(selectedId, { preserveScroll: true });
        });
        return;
      }
      if (e.target.id === "btnMarkAllUndone") {
        e.preventDefault();
        bulkSetActions(false).then((ok) => {
          if (!ok) return showToast("Could not update actions", "error");
          loadDetail(selectedId, { preserveScroll: true });
        });
        return;
      }
      if (e.target.id === "btnSortTimeline") {
        e.preventDefault();
        sortTimelineByTime().then((ok) => {
          if (!ok) return showToast("Could not sort timeline", "error");
          showToast("Timeline sorted by timestamp");
          loadDetail(selectedId, { preserveScroll: true });
        });
        return;
      }
      const tb = e.target.closest(".timeline-body");
      if (tb && !tb.querySelector(".action-edit-form")) {
        e.preventDefault();
        openTimelineRowEditor(tb);
        return;
      }
      const ab = e.target.closest(".action-body");
      if (ab && !ab.querySelector(".action-edit-form")) {
        e.preventDefault();
        openActionRowEditor(ab);
        return;
      }
      const mdWrap = e.target.closest(".md-editable[data-section]");
      if (mdWrap && !mdWrap.classList.contains("is-editing") && mdWrap.dataset.section) {
        e.preventDefault();
        startEdit(mdWrap.dataset.section);
        return;
      }
      const btn = e.target.closest(".btn-edit-section");
      if (!btn || !btn.dataset.section) return;
      e.preventDefault();
      startEdit(btn.dataset.section);
    });

    mainEl.addEventListener("keydown", (e) => {
      if (e.key !== "Enter" || e.ctrlKey || e.metaKey || e.altKey || e.shiftKey) return;
      const ab = e.target.closest(".action-body");
      if (!ab || ab.querySelector(".action-edit-form")) return;
      e.preventDefault();
      openActionRowEditor(ab);
      return;
    });

    mainEl.addEventListener("keydown", (e) => {
      if (e.key !== "Enter" || e.ctrlKey || e.metaKey || e.altKey || e.shiftKey) return;
      const tb = e.target.closest(".timeline-body");
      if (!tb || tb.querySelector(".action-edit-form")) return;
      e.preventDefault();
      openTimelineRowEditor(tb);
    });

    mainEl.addEventListener("change", async (e) => {
      const t = e.target;
      if (!(t instanceof HTMLInputElement) || t.type !== "checkbox" || !t.classList.contains("action-done-cb")) {
        return;
      }
      const row = t.closest(".action-row");
      if (!row || !selectedId) return;
      const idx = parseInt(row.dataset.actionIndex, 10);
      if (Number.isNaN(idx)) return;
      const prev = !t.checked;
      t.disabled = true;
      const ok = await patchAction(idx, { done: t.checked });
      t.disabled = false;
      if (!ok) t.checked = prev;
    });

    mainEl.addEventListener("dragstart", (e) => {
      const row = e.target.closest(".action-row[data-action-index]");
      if (!row) return;
      dragActionIndex = parseInt(row.dataset.actionIndex, 10);
      row.classList.add("dragging");
    });
    mainEl.addEventListener("dragend", (e) => {
      const row = e.target.closest(".action-row, .timeline-row");
      if (row) row.classList.remove("dragging");
      mainEl.querySelectorAll(".drop-target").forEach((el) => el.classList.remove("drop-target"));
      dragActionIndex = null;
    });
    mainEl.addEventListener("dragover", (e) => {
      const target = e.target.closest(".action-row[data-action-index]");
      if (!target) return;
      e.preventDefault();
      mainEl.querySelectorAll(".drop-target").forEach((el) => el.classList.remove("drop-target"));
      target.classList.add("drop-target");
    });
    mainEl.addEventListener("drop", async (e) => {
      const target = e.target.closest(".action-row[data-action-index]");
      if (!target) return;
      e.preventDefault();
      const actionIdx = parseInt(target.dataset.actionIndex, 10);
      if (dragActionIndex != null && actionIdx != null && dragActionIndex !== actionIdx) {
        const ok = await reorderActions(dragActionIndex, actionIdx);
        if (!ok) showToast("Could not reorder actions", "error");
        else await loadDetail(selectedId, { preserveScroll: true });
      }
    });

    function renderList() {
      listEl.innerHTML = "";
      setExportEnabled(Boolean(selectedId));
      if (!summaries.length) {
        const p = document.createElement("p");
        p.className = "empty";
        p.style.padding = "1rem";
        p.textContent = "No postmortems yet.";
        listEl.appendChild(p);
        return;
      }

      const collapsed = getCollapsedBuckets();
      const q = sidebarSearch ? String(sidebarSearch.value || "").trim().toLowerCase() : "";
      const byBucket = new Map();
      for (const b of STATUS_BUCKETS) byBucket.set(b.key, []);

      for (const row of summaries) {
        const k = statusBucket(row.status);
        if (sidebarStatusFilter !== "all" && k !== sidebarStatusFilter) continue;
        if (q) {
          const hay = (String(row.title || "") + " " + String(row.id || "")).toLowerCase();
          if (!hay.includes(q)) continue;
        }
        if (!byBucket.has(k)) byBucket.set(k, []);
        byBucket.get(k).push(row);
      }

      for (const rows of byBucket.values()) {
        rows.sort((a, b) => {
          const da = String(a.date || "");
          const db = String(b.date || "");
          if (da !== db) return db.localeCompare(da);
          return String(a.title || a.id).localeCompare(String(b.title || b.id));
        });
      }

      for (const def of STATUS_BUCKETS) {
        const rows = byBucket.get(def.key) || [];
        if (!rows.length) continue;

        const details = document.createElement("details");
        details.className = "status-group";
        details.dataset.bucket = def.key;
        const hasSelectionHere =
          Boolean(selectedId) && rows.some((r) => r.id === selectedId);
        details.open = hasSelectionHere ? true : !collapsed.has(def.key);

        const summary = document.createElement("summary");
        summary.innerHTML =
          '<span class="summary-left"><span class="chev" aria-hidden="true"></span>' +
          '<span class="' + esc(def.labelClass) + '">' + esc(def.label) + "</span></span>" +
          '<span class="count">' + rows.length + "</span>";
        details.appendChild(summary);

        const ul = document.createElement("ul");
        ul.className = "list nested";
        for (const row of rows) {
          const li = document.createElement("li");
          const bbtn = document.createElement("button");
          bbtn.type = "button";
          bbtn.dataset.id = row.id;
          if (row.id === selectedId) bbtn.classList.add("active");
          const metaLine =
            def.key === "other" && row.status
              ? row.status + " · " + (row.date || "—")
              : row.date || "—";
          const unresolved = Number(row.unresolved_actions || 0);
          const unresolvedTxt = unresolved > 0 ? " · " + unresolved + " open actions" : "";
          bbtn.innerHTML =
            esc(row.title || row.id) +
            '<span class="meta">' + esc(metaLine + unresolvedTxt) + "</span>";
          bbtn.addEventListener("click", () => {
            selectedId = row.id;
            renderList();
            loadDetail(row.id);
          });
          li.appendChild(bbtn);
          ul.appendChild(li);
        }
        details.appendChild(ul);
        listEl.appendChild(details);
      }
    }

    async function loadSummaries() {
      const r = await fetch("/api/postmortems");
      if (!r.ok) throw new Error("Failed to load list");
      summaries = await r.json();
      renderList();
      if (selectedId && !summaries.some((s) => s.id === selectedId)) {
        selectedId = null;
        mainEl.innerHTML = '<p class="empty">Select an incident.</p>';
        setExportEnabled(false);
      }
    }

    async function loadDetail(id, opts = {}) {
      const preserveScroll = Boolean(opts && opts.preserveScroll);
      const priorScrollTop = preserveScroll ? mainEl.scrollTop : 0;
      destroyActiveEditor();
      closeActionRowEditor();
      closeTimelineRowEditor();
      mainEl.innerHTML =
        '<div class="loading-skeleton" aria-hidden="true">' +
        '<div class="loading-line lg"></div>' +
        '<div class="loading-line md"></div>' +
        '<div class="loading-line"></div>' +
        '<div class="loading-line sm"></div>' +
        "</div>";
      const r = await fetch("/api/postmortems/" + encodeURIComponent(id));
      if (r.status === 404) {
        mainEl.innerHTML = '<p class="error">Not found.</p>';
        return;
      }
      if (!r.ok) {
        mainEl.innerHTML = '<p class="error">Failed to load incident.</p>';
        return;
      }
      const d = await r.json();
      const ov = d.overview || {};
      const title = ov.incident_title || id;
      const st = ov.status || "";
      const badgeClass = "badge " + statusClass(st);
      const participants = d.incident_participants;
      const partStr = Array.isArray(participants)
        ? participants.join(", ")
        : (participants || "");

      const imp = d.impact_and_severity || {};
      const res = d.resolution || {};
      const parsedImpact = parseImpactSubsections(impactMarkdownForEdit(imp));

      lastDetailRaw = {
        summary: d.incident_summary || "",
        impact: impactMarkdownForEdit(imp),
        impact_affected: parsedImpact.affected || "",
        impact_duration: parsedImpact.duration || "",
        impact_business: parsedImpact.business || "",
        root_cause: d.root_cause || "",
        resolution_temporary: res.temporary_fix || "",
        resolution_permanent: res.permanent_fix || "",
      };

      const timeline = Array.isArray(d.timeline) ? d.timeline : [];
      lastTimeline = timeline;
      function parseTimelineDate(text) {
        const raw = String(text || "").trim();
        if (!raw) return null;
        let dt = new Date(raw);
        if (!Number.isNaN(dt.getTime())) return dt;
        dt = new Date(raw.replace(" UTC", "Z"));
        if (!Number.isNaN(dt.getTime())) return dt;
        return null;
      }
      function relLabel(dt) {
        if (!dt) return "";
        const mins = Math.round((Date.now() - dt.getTime()) / 60000);
        const absMins = Math.abs(mins);
        if (absMins < 60) return mins >= 0 ? absMins + "m ago" : "in " + absMins + "m";
        const hrs = Math.round(absMins / 60);
        if (hrs < 24) return mins >= 0 ? hrs + "h ago" : "in " + hrs + "h";
        const days = Math.round(hrs / 24);
        return mins >= 0 ? days + "d ago" : "in " + days + "d";
      }
      let tlHtml = "";
      if (timeline.length) {
        let currentDay = "";
        const chunks = [];
        for (let i = 0; i < timeline.length; i += 1) {
          const ev = timeline[i];
          if (!ev || typeof ev !== "object") {
            chunks.push("<li class=\"timeline-row timeline-row-plain\">" + esc(String(ev)) + "</li>");
            continue;
          }
          const keys = Object.keys(ev || {});
          const timeVal = ev.time != null ? ev.time : "";
          const dt = parseTimelineDate(timeVal);
          const dayKey = dt
            ? dt.toLocaleDateString(undefined, {
              weekday: "short",
              year: "numeric",
              month: "short",
              day: "numeric",
            })
            : "Unparsed time";
          if (dayKey !== currentDay) {
            currentDay = dayKey;
            chunks.push('<li class="timeline-day">' + esc(dayKey) + "</li>");
          }
          let body = "";
          if (ev.action != null) body = String(ev.action);
          else {
            const rest = keys.filter((k) => k !== "time");
            body = rest.map((k) => k + ": " + String(ev[k])).join(" · ");
          }
          chunks.push(
            '<li class="timeline-row" data-timeline-index="' +
            i +
            '"><div class="timeline-time-line"><div class="t">' +
            esc(timeVal || "—") +
            '</div><span class="timeline-rel">' +
            esc(relLabel(dt)) +
            '</span></div><div class="a md timeline-body" tabindex="0" role="button" title="Click to edit timeline event">' +
            renderMd(body) +
            "</div></li>"
          );
        }
        tlHtml = '<ul class="timeline">' + chunks.join("") + "</ul>";
      } else {
        tlHtml = "<p class=\"empty\">No timeline entries yet - add the first event.</p>";
      }

      const summaryMd = renderMd(lastDetailRaw.summary);
      const impactAffectedMd = renderMd(lastDetailRaw.impact_affected);
      const impactDurationMd = renderMd(lastDetailRaw.impact_duration);
      const impactBusinessMd = renderMd(lastDetailRaw.impact_business);
      const rootMd = renderMd(lastDetailRaw.root_cause);
      const tempMd = renderMd(lastDetailRaw.resolution_temporary);
      const permMd = renderMd(lastDetailRaw.resolution_permanent);

      const actions = Array.isArray(d.actions_and_follow_up) ? d.actions_and_follow_up : [];
      lastActions = actions;
      ownerSuggestions = collectOwnerSuggestions(d, actions);
      const actionsHtml = buildActionsHtml(actions);
      const assets = Array.isArray(d.assets) ? d.assets : [];
      const assetsHtml = assets.length
        ? '<ul class="assets-list">' +
          assets.map((assetPath) => {
            const p = String(assetPath || "").trim();
            if (!p) return "";
            const href =
              "/api/postmortems/" +
              encodeURIComponent(id) +
              "/assets/" +
              p.split("/").map((part) => encodeURIComponent(part)).join("/");
            return '<li><a href="' + esc(href) + '" target="_blank" rel="noopener">' + esc(p) + "</a></li>";
          }).join("") +
          "</ul>"
        : '<p class="empty">No assets attached.</p>';

      mainEl.innerHTML =
        '<div class="detail">' +
        '<div class="detail-top">' +
        "<h2>" + esc(title) + "</h2>" +
        '<span class="' + esc(badgeClass) + '">' + esc(st || "—") + "</span>" +
        "</div>" +
        "<section><h3>Overview</h3>" +
        "<p>Date: " + esc(ov.date) + " · Time: " + esc(ov.time) + "</p></section>" +
        "<section><h3>Owner</h3><p>" + esc(d.incident_owner) + "</p></section>" +
        "<section><h3>Participants</h3><p>" + esc(partStr) + "</p></section>" +
        sectionWithEdit("Summary", "summary", summaryMd || "<p class=\"empty\">—</p>") +
        "<section><h3>Impact</h3>" +
        '<div class="section-head"><span class="md-subtitle">Affected services</span>' +
        '<button type="button" class="btn-edit-section" data-section="impact_affected">Edit</button></div>' +
        editableBlock("impact_affected", impactAffectedMd || "<p class=\"empty\">—</p>") +
        '<div class="section-head" style="margin-top:0.75rem"><span class="md-subtitle">Duration</span>' +
        '<button type="button" class="btn-edit-section" data-section="impact_duration">Edit</button></div>' +
        editableBlock("impact_duration", impactDurationMd || "<p class=\"empty\">—</p>") +
        '<div class="section-head" style="margin-top:0.75rem"><span class="md-subtitle">Business impact</span>' +
        '<button type="button" class="btn-edit-section" data-section="impact_business">Edit</button></div>' +
        editableBlock("impact_business", impactBusinessMd || "<p class=\"empty\">—</p>") +
        "</section>" +
        sectionWithEdit("Root cause", "root_cause", rootMd || "<p class=\"empty\">—</p>") +
        "<section><h3>Resolution</h3>" +
        '<div class="section-head"><span class="md-subtitle">Temporary</span>' +
        '<button type="button" class="btn-edit-section" data-section="resolution_temporary">Edit</button></div>' +
        editableBlock("resolution_temporary", tempMd || "<p class=\"empty\">—</p>") +
        '<div class="section-head" style="margin-top:0.75rem"><span class="md-subtitle">Permanent</span>' +
        '<button type="button" class="btn-edit-section" data-section="resolution_permanent">Edit</button></div>' +
        editableBlock("resolution_permanent", permMd || "<p class=\"empty\">—</p>") +
        "</section>" +
        "<section><div class=\"section-head\"><h3>Actions / follow-up</h3>" +
        '<div style="display:flex; gap:0.35rem; flex-wrap:wrap">' +
        '<button type="button" class="btn-edit-section" id="btnMarkAllDone" title="Mark all actions done">Mark all done</button>' +
        '<button type="button" class="btn-edit-section" id="btnMarkAllUndone" title="Mark all actions undone">Mark all undone</button>' +
        '<button type="button" class="btn-edit-section btn-add-action" id="btnAddAction" title="Add follow-up item">Add action</button>' +
        "</div></div>" +
        '<div id="actionNewHost"></div>' +
        '<datalist id="ownerSuggestionsList">' +
        ownerSuggestions.map((o) => '<option value="' + esc(o) + '"></option>').join("") +
        "</datalist>" +
        actionsHtml +
        "</section>" +
        "<section><div class=\"section-head\"><h3>Timeline</h3>" +
        '<div style="display:flex; gap:0.35rem; flex-wrap:wrap">' +
        '<button type="button" class="btn-edit-section" id="btnSortTimeline" title="Sort timeline by parsed timestamps">Sort by time</button>' +
        '<button type="button" class="btn-edit-section btn-add-action" id="btnAddTimeline" title="Add timeline event">Add event</button>' +
        "</div></div>" +
        '<div id="timelineNewHost"></div>' +
        tlHtml +
        "</section>" +
        "<section><h3>Assets</h3>" +
        assetsHtml +
        "</section>" +
        "</div>";
      if (preserveScroll) {
        mainEl.scrollTop = priorScrollTop;
      }
    }

    function connectSSE() {
      const es = new EventSource("/api/events");
      es.onopen = () => {
        liveDot.classList.add("on");
        liveLabel.textContent = "Live";
      };
      es.onerror = () => {
        liveDot.classList.remove("on");
        liveLabel.textContent = "Reconnecting…";
      };
      es.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === "postmortems_updated") {
            loadSummaries().then(() => {
              if (selectedId) return loadDetail(selectedId);
            }).catch(() => {});
          }
        } catch (_) {}
      };
    }

    loadStatusConfig()
      .catch(() => {})
      .then(() => loadSummaries())
      .then(() => {
        mainEl.innerHTML = '<p class="empty">Select an incident.</p>';
      })
      .catch(() => {
        mainEl.innerHTML = '<p class="error">Could not load postmortems.</p>';
      });
    connectSSE();
  </script>
</body>
</html>
